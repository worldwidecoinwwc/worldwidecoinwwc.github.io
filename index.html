<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldWideCoin (WWC)</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #F3F4F6;
  color: #1F2937;
}

/* TOP HEADER */

header {
  background: #E5E7EB;
  padding: 20px 40px;
  font-size: 28px;
  font-weight: 800;
}

header .worldwide {
  color: #1F2937;
}

header .coin {
  color: #D4AF37;
}

/* HERO SECTION */

.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero-title {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  font-size: 48px;
  font-weight: 800;
  margin-bottom: 20px;
}

.inline-logo {
  height: 55px;
  width: auto;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

.hero-title .worldwide {
  color: #1F2937;
}

.hero-title .coin {
  color: #1F2937; /* Keep full heading black like screenshot */
}

/* SUBTITLE */

.subtitle {
  font-size: 28px;
  margin-bottom: 30px;
}

.subtitle span {
  color: #C9A227;
  font-weight: 700;
}

/* DESCRIPTION */

.hero p {
  max-width: 750px;
  margin: 30px auto;
  font-size: 20px;
  color: #6B7280;
  line-height: 1.6;
}

/* BUTTON */

.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 18px 50px;
  background: #C9A227;
  color: white;
  text-decoration: none;
  font-weight: 700;
  border-radius: 12px;
  font-size: 20px;
}

.btn:hover {
  background: #B8962E;
}

/* MOBILE FIX */

@media (max-width: 768px) {

  .hero-title {
    font-size: 32px;
    flex-direction: column;
  }

  .inline-logo {
    height: 45px;
  }

  .subtitle {
    font-size: 22px;
  }

  .hero p {
    font-size: 18px;
  }

}

</style>
</head>

<body>

<header>
  <span class="worldwide">WorldWide</span><span class="coin">Coin</span>
</header>

<section class="hero">

  <h1 class="hero-title">
    <img src="logo.png" alt="WWC Logo" class="inline-logo">
    <span class="worldwide">WorldWide</span><span class="coin">Coin</span>
  </h1>

  <div class="subtitle">
    A Global <span>Mining-Only</span> Digital Asset
  </div>

  <p>
    WorldWideCoin (WWC) is a decentralized cryptocurrency engineered for sustainable long-term emission, predictable monetary policy, and fair CPU-based global participation.
  </p>

  <a href="whitepaper.html" class="btn">
    Read Technical Whitepaper
  </a>

</section>

</body>
</html>
