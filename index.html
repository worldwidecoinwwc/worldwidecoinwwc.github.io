<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldWideCoin (WWC)</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to bottom, #F9FAFB, #EEF1F5);
  color: #1F2937;
}

/* NAVBAR */

nav {
  background: #1F2937;
  padding: 12px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  padding: 6px 12px;
  border-radius: 6px;
}

nav a:hover {
  background: rgba(255,255,255,0.1);
}

/* HEADER */

header {
  background: #E5E7EB;
  padding: 20px;
  text-align: center;
  font-size: 26px;
  font-weight: 800;
}

header .coin { color: #C9A227; }

/* HERO */

.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero-title {
  font-size: 46px;
  font-weight: 800;
}

.subtitle {
  font-size: 24px;
  margin: 20px 0;
}

.subtitle span {
  color: #C9A227;
}

.hero p {
  max-width: 700px;
  margin: auto;
  color: #6B7280;
  line-height: 1.7;
}

/* BUTTON */

.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 14px 40px;
  background: linear-gradient(135deg, #C9A227, #E6C15A);
  color: white;
  text-decoration: none;
  font-weight: 700;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(201,162,39,0.3);
  transition: 0.2s;
}

.btn:active {
  transform: scale(0.97);
}

/* MOBILE */

@media (max-width: 768px) {
  .hero-title { font-size: 32px; }
  .subtitle { font-size: 18px; }
  .hero { padding: 60px 15px; }
  .btn { width: 85%; }
}

</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="tokenomics.html">Tokenomics</a>
  <a href="mining.html">Mining</a>
  <a href="roadmap.html">Roadmap</a>
  <a href="downloads.html">Downloads</a>
</nav>

<header>
  WorldWide<span class="coin">Coin</span>
</header>

<section class="hero">

  <h1 class="hero-title">WorldWideCoin</h1>

  <div class="subtitle">
    A Global <span>Mining-Only</span> Digital Asset
  </div>

  <p>
    Fair distribution. No premine. No ICO. CPU-friendly mining accessible to anyone.
    Built for long-term miners and decentralized global participation.
  </p>

  <a href="mining.html" class="btn">Start Mining</a>

</section>

</body>
</html>
